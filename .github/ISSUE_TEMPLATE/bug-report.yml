name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: [bug]
assignees: Peperehobbit01
  - 
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you saw, what is the issue?
      placeholder: Tell us what you saw!
      value: "A bug happened!"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What did you expected?
      description: What did you expect to happen?
      placeholder: Tell us what you saw!
      value: "I expected that it would do that but the other thing happend."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: You must provide a way to reproduce the problem.
      placeholder: "1. You do this
                    2. Then you do that
                    3. etc
                    4. Then the bug happend"
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of the modpack are you running?
      options:
        - Stable = on the release page of the modpack
        - Beta = on the release page marked as beta/alpha
        - Dev = special versions made only for beta testers
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: Shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/Peperehobbit01/Peperehobbits01-s-bot/blob/main/.github/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
